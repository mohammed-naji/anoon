  <!-- name, email, phone, image, gender, bio -->
  <form enctype="multipart/form-data">
    <fieldset>
      <legend>Personal Details</legend>
      <div>
        <label for="education">Education</label> <br>
        <select name="education" id="education">
          <option>Bachelor</option>
          <option>Master</option>
          <option>phD</option>
        </select>
      </div>
      <br>
      <div>
        <label for="name">Name</label> <br>
        <input type="date" id="name" placeholder="Your Name.." name="name">
      </div>
      <br>
      <div>
        <label for="email">Email</label> <br>
        <input type="email" id="email" placeholder="Your Email.." name="email">
      </div>
      <br>
      <div>
        <label for="phone">Phone</label> <br>
        <input type="text" id="phone" placeholder="Your phone.." name="phone">
      </div>
      <br>
      <div>
        <label for="image">Image</label> <br>
        <input type="file" id="image" name="image">
      </div>
      <br>
      <div>
        <label>Gender</label> <br>
        <input type="radio" id="male" name="gender"> <label for="male">Male</label>
        <label><input type="radio" name="gender"> Female</label>
      </div>
      <br>
      <div>
        <label for="bio">Bio</label> <br>
        <textarea id="bio" name="bio" rows="5" placeholder="Your Bio.."></textarea>
      </div>
      <br>
      <button>Send</button>
      <button type="reset">Reset</button>
    </fieldset>
  </form>
